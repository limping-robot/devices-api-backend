# App shares Postgres's network namespace; JVM uses 127.0.0.1:5432 (container-internal port).
# Host port 5433 avoids clashing with a local Postgres or another stack on 5432. Change to "5432:5432" if free.
# Port 8080 is published on `postgres` because that container owns the shared network stack.
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: devices
      POSTGRES_USER: devices
      POSTGRES_PASSWORD: devices
    ports:
      - "5433:5432"
      - "8080:8080"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U devices -d devices"]
      interval: 3s
      timeout: 5s
      retries: 10

  app:
    build: .
    network_mode: "service:postgres"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://127.0.0.1:5432/devices
      SPRING_DATASOURCE_USERNAME: devices
      SPRING_DATASOURCE_PASSWORD: devices

volumes:
  pgdata:
