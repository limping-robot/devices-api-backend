server:
  address: 0.0.0.0

spring:
  application:
    name: devices-api
  datasource:
    url: jdbc:postgresql://localhost:5432/devices
    username: devices
    password: devices
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
